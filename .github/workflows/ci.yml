name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :pumpkin:loader:shadowJar --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuckPerms-Pumpkin
          path: pumpkin/loader/build/libs/LuckPerms-Pumpkin-*.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :pumpkin:loader:shadowJar --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pumpkin/loader/build/libs/LuckPerms-Pumpkin-*.jar
